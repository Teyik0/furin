pre-commit:
  parallel: true
  jobs:
    - name: files format
      run: bun run fix
      stage_fixed: true

    - name: typescript check
      run: bun run test:types
      stage_fixed: true

pre-push:
  jobs:
    - name: Build
      run: bun run build

    - name: Test
      run: bun run test

commit-msg:
  commands:
    lint-commit-message:
      run: bun run commitlint --edit {1}
