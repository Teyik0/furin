[run]
bun = true

[test]
root = "./tests"
coverageThreshold = { lines = 0.8, functions = 0.8 }
coverageReporter = ["text", "lcov"]
coverage = true
coveragePathIgnorePatterns = [
  "**/*.test.ts",
  "**/fixtures/**/*",
  "**/bun-strip-plugin.ts",  # Bun build-time plugin, not unit-testable
  "**/render/template.ts",  # Requires running HTTP server + filesystem, not unit-testable
  "**/private/var/**",  # macOS temp files
  "**/var/folders/**", # macOS temp files (symlink)
  "**/tmp/**" # linux CI temp files
]
